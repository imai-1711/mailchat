// ═══════════════════════════════════════════════
//  テーマ
// ═══════════════════════════════════════════════
const LIGHT = {
  bg:"#F5F5F7", sidebar:"#fff", surface:"#fff", surfaceAlt:"#F9FAFB",

const DARK = {

  hover:"#1E2A3A", border:"#30363D", borderFaint:"#21262D",
  text:"#E6EDF3", textSec:"#8B949E", textTer:"#6E7681",
  recvBubble:"#1E2A3A", unreadBubble:"#1C2333", unreadBorder:"#3D4F9F",
  inputBg:"#141924", accent:"#6B7FEE", highlight:"#1D2649",

// ═══════════════════════════════════════════════
//  設定
// ═══════════════════════════════════════════════
const CONFIG = {
  N8N_BASE_URL:"https://n8n.niida-imai.work",
  FETCH_WEBHOOK:"/webhook/fetch-emails",
  SEND_WEBHOOK:"/webhook/send-email",
  STYLE_PROFILE_WEBHOOK:"/webhook/style-profile",
  CLAUDE_API_KEY:"",
  CLAUDE_MODEL:"claude-sonnet-4-20250514",
  STYLE_SAMPLE_COUNT:20,
  ACCOUNTS:[
    {id:"work",    name:"仕事用",       email:"imai@1711.jp",        color:"#4A5EDB"},
    {id:"private", name:"プライベート", email:"private@example.com", color:"#10B981"},
  ],
  // ACCOUNTS 以外に「自分」として扱うアドレス（サブ・テスト用など）
  MY_EXTRA_EMAILS:["fcbb.showtime@gmail.com"],
};
// 自分の全アドレス = ACCOUNTS + MY_EXTRA_EMAILS
const MY_IDENTITIES=[
  ...CONFIG.ACCOUNTS.map(a=>a.email.toLowerCase()),
  ...(CONFIG.MY_EXTRA_EMAILS||[]).map(e=>e.toLowerCase()),
];
const MY_EMAILS=MY_IDENTITIES; // 後方互換
const LS_PROFILE = "mailchat_style_profile";
const LS_STARRED = "mailchat_starred";
const LS_READ    = "mailchat_read";
const LS_SUMM    = "mailchat_summaries";
const LS_TASKS   = "mailchat_tasks";
const LS_DARK    = "mailchat_dark";

// ═══════════════════════════════════════════════
//  ユーティリティ
// ═══════════════════════════════════════════════
const stripPrefix = (s) => (s||"").replace(/^(Re|Fwd|Fw|RE|FWD|FW):\s*/gi,"").trim();
const isSelf = (e) => MY_EMAILS.includes((e||"").toLowerCase());
const lsGet  = (k,d) => {try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const lsSet  = (k,v) => {try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

const normalizeSubject = (s) => {
  if(!s)return'';
  return stripPrefix(s).replace(/\s+/g,' ').replace(/　/g,' ').normalize('NFC').trim().toLowerCase();
};
// messageId が空/undefined でもクラッシュしない安定キー
const getMailKey=(m)=>m.messageId||m.id||[m.from||'',m.subject||'',m.date||''].join('\x00');

const getContact = (thread) => {
  for(const m of thread.mails){
    if(!isSelf(m.from))return{name:m.fromName||m.from.split("@")[0],email:m.from};
    if(m.to&&!isSelf(m.to))return{name:m.to.split("@")[0],email:m.to};
  }
  const m=thread.mails[0];
  return{name:m.fromName||m.from.split("@")[0],email:m.from};
};

const ACOLORS=["#4A5EDB","#10B981","#F59E0B","#EF4444","#8B5CF6","#06B6D4","#F97316","#EC4899","#14B8A6","#A855F7"];
const avatarColor=(s)=>{let h=0;for(const c of(s||"?"))h=(h*31+c.charCodeAt(0))&0xFFFF;return ACOLORS[h%ACOLORS.length];};
const initials=(n)=>{if(!n)return"?";const p=n.trim().split(/\s+/);return p.length>1?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();};

const formatDate=(ds)=>{
  if(!ds)return"";const d=new Date(ds);if(isNaN(d))return ds;
  const now=new Date(),diff=(new Date(now.getFullYear(),now.getMonth(),now.getDate())-new Date(d.getFullYear(),d.getMonth(),d.getDate()))/86400000;
  if(diff<1)return d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  if(diff<7)return["日","月","火","水","木","金","土"][d.getDay()]+"曜";
  if(d.getFullYear()===now.getFullYear())return(d.getMonth()+1)+"/"+(d.getDate());
  return d.getFullYear()+"/"+(d.getMonth()+1)+"/"+(d.getDate());
};
const formatDateSep=(ds)=>{
  const d=new Date(ds);if(isNaN(d))return"";
  const now=new Date(),diff=(new Date(now.getFullYear(),now.getMonth(),now.getDate())-new Date(d.getFullYear(),d.getMonth(),d.getDate()))/86400000;
  if(diff<1)return"今日";if(diff<2)return"昨日";
  return d.toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"});
};
const dayKey=(ds)=>{const d=new Date(ds);return isNaN(d)?ds:`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;};
const getDateGroup=(ds)=>{
  const d=new Date(ds);const now=new Date();
  if(isNaN(d))return"不明";
  const sod=(x)=>{const c=new Date(x);c.setHours(0,0,0,0);return c;};
  const todayStart=sod(now);const yd=new Date(todayStart);yd.setDate(yd.getDate()-1);
  if(d>=todayStart)return"今日";
  if(d>=yd)return"昨日";
  const weekStart=new Date(todayStart);weekStart.setDate(todayStart.getDate()-6);
  if(d>=weekStart)return"今週";
  if(d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth())return"今月";
  const lm=new Date(now.getFullYear(),now.getMonth()-1,1);
  if(d.getFullYear()===lm.getFullYear()&&d.getMonth()===lm.getMonth())return"先月";
  return d.getFullYear()+"年"+(d.getMonth()+1)+"月";
};

const stripQuoted=(body)=>{
  if(!body)return{text:'',hasQuote:false};
  const lines=body.split('\n');
  const pats=[
    /^>+/,
    /^-{3,}\s*(original message|forwarded|転送)/i,
    /^_{4,}/,
    /^On .{5,100} wrote\s*:/i,
    /^\d{4}[\/\-年]\d{1,2}[\/\-月]\d{1,2}.{0,60}wrote\s*:/i,
    /^-----.{0,30}-----/,
    /^【?From[\s：:]/i,
    /^差出人[\s：:]/,
    /^送信日時[\s：:]/,
    /^In reply to/i,
    // n8n 自動送信フッター
    /^-{2,}\s*this email was sent/i,
    /^-{2,}\s*このメールは自動/i,
    // Spike / チャットアプリ自動フッター
    /^chat\s*@\s*spike/i,
    /^sent\s*(from|via|with)\s*(spike|gmail|mail)/i,
    /^iphone\s*から送信/i,
    // メール署名セパレーター
    /^--\s*$/,
    /^_{2,}\s*$/,
  ];
  let cut=lines.length;
  for(let i=0;i<lines.length;i++){const t=lines[i].trim();if(t&&pats.some(p=>p.test(t))){cut=i;while(cut>0&&lines[cut-1].trim()==='')cut--;break;}}
  return{text:lines.slice(0,cut).join('\n').trimEnd()||body.slice(0,200),hasQuote:cut<lines.length};
};

const groupByThread=(emails)=>{
  const midToKey=new Map();
  // getMailKey() で messageId 欠落メールも安全にキー付け
  emails.forEach(m=>midToKey.set(getMailKey(m),normalizeSubject(m.subject)||'(件名なし)'));
  emails.forEach(m=>{
    const mk=getMailKey(m);
    const refs=[m.inReplyTo,...(m.references||'').split(/\s+/)].map(r=>(r||'').trim()).filter(Boolean);
    for(const ref of refs){
      if(midToKey.has(ref)){
        const pk=midToKey.get(ref),cur=midToKey.get(mk);
        if(cur!==pk)midToKey.forEach((v,k)=>{if(v===cur)midToKey.set(k,pk);});
        break;
      }
    }
  });
  const km=new Map();
  emails.forEach(m=>{const key=midToKey.get(getMailKey(m))||normalizeSubject(m.subject)||'(件名なし)';if(!km.has(key))km.set(key,[]);km.get(key).push(m);});
  const threads=[];
  km.forEach((mails,key)=>{
    const sorted=[...mails].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const unread=sorted.filter(m=>!m.read&&!isSelf(m.from)).length;
    const hasAttach=sorted.some(m=>(m.attachments||[]).length>0);
    threads.push({id:key,subject:sorted[0].subject?stripPrefix(sorted[0].subject):key,mails:sorted,latest:sorted[sorted.length-1],unread,accountId:sorted[0].accountId,hasAttach});
  });
  return threads.sort((a,b)=>new Date(b.latest.date)-new Date(a.latest.date));
};

const attIcon=(mime)=>mime?.startsWith("image/")?"🖼":mime?.includes("pdf")?"📄":mime?.includes("word")||mime?.includes("document")?"📝":mime?.includes("sheet")||mime?.includes("excel")?"📊":mime?.includes("zip")||mime?.includes("compressed")?"🗜":"📎";
const attSize=(n)=>n>1048576?(n/1048576).toFixed(1)+"MB":n>1024?(n/1024).toFixed(0)+"KB":n?n+"B":"";

// ═══════════════════════════════════════════════
//  Claude API
// ═══════════════════════════════════════════════
const claudeRequest=async(system,userContent,maxTokens=1024)=>{
  if(!CONFIG.CLAUDE_API_KEY)throw new Error("CLAUDE_API_KEY が未設定です");
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"x-api-key":CONFIG.CLAUDE_API_KEY,"anthropic-version":"2023-06-01","content-type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:CONFIG.CLAUDE_MODEL,max_tokens:maxTokens,system,messages:[{role:"user",content:userContent}]})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(`Claude ${res.status}: ${e.error?.message||res.statusText}`);}
  return(await res.json()).content[0].text;
};
const summarizeThread=(mails)=>claudeRequest("メール要約アシスタント。スレッドを1〜2文で要約。要対応なら「要対応：」を先頭に。",mails.map(m=>`From:${m.from}\n${m.body||m.snippet||""}`).join("\n\n---\n\n"));
const detectSpam=async(mail)=>JSON.parse((await claudeRequest(`スパム検出AI。JSON{"score":0-100,"verdict":"スパム"|"疑わしい"|"正常","reason":"1文"}のみ返す。`,`From:${mail.from}\nSubject:${mail.subject}\n\n${mail.body||""}`)).trim());
const analyzeStyle=async(sentMails)=>JSON.parse((await claudeRequest(`文体分析。JSON{"tone":"","greetings":[],"closings":[],"characteristics":[],"sentenceLength":"短め|中程度|長め","formalityLevel":1-5,"keyPhrases":[],"avoidPhrases":[],"summary":""}のみ返す。`,sentMails.slice(0,CONFIG.STYLE_SAMPLE_COUNT).map((m,i)=>`【${i+1}】${m.subject}\n${m.body||""}`).join("\n\n════\n\n"),2048)).trim());
const generateReplies=async(mail,sp)=>{
  const styleHint = sp
    ? "文体:"+sp.tone+" 丁寧さ:"+sp.formalityLevel+"/5 書き出し:"+(sp.greetings||[]).join("/")+" 締め:"+(sp.closings||[]).join("/")
    : "";
  const system = "ビジネスメール返信アシスタント。"+styleHint+"\n3案をJSON[{\"label\":\"丁寧\",\"body\":\"...\"},{\"label\":\"簡潔\",\"body\":\"...\"},{\"label\":\"詳細\",\"body\":\"...\"}]のみで返す。";
  const user   = "From:"+mail.from+"\nSubject:"+mail.subject+"\n\n"+(mail.body||mail.snippet||"");
  return JSON.parse((await claudeRequest(system,user,1500)).trim());
};

// ═══════════════════════════════════════════════
//  n8n
// ═══════════════════════════════════════════════
const fetchEmails=async(accountId)=>{
  const res=await fetch(`${CONFIG.N8N_BASE_URL}${CONFIG.FETCH_WEBHOOK}?accountId=${accountId}`);
  if(!res.ok)throw new Error(`メール取得エラー: ${res.status}`);
  const d=await res.json();return Array.isArray(d)?d:(d.emails||[]);
};
const sendEmailAPI=async(p)=>{
  const res=await fetch(`${CONFIG.N8N_BASE_URL}${CONFIG.SEND_WEBHOOK}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});
  if(!res.ok)throw new Error(`送信エラー: ${res.status}`);
  try{return await res.json();}catch{return {};}
};
// スレッド内で「自分以外の最新送信者」を返す（返信先アドレス決定）
const findReplyTarget=(thread)=>{
  const m=[...thread.mails].reverse().find(m=>!isSelf(m.from));
  if(m?.from) return m.from;
  // 全メールが自分同士（テスト用2アドレス間など）→ 最新メールのtoから相手を特定
  const last=thread.mails[thread.mails.length-1];
  return (last?.to||"").split(/[,;<>\s]+/).find(s=>s.includes("@"))||"";
};
// スレッドに対して「適切な送信元アカウント」を決定
// 優先: 受信メールの To に含まれる自分のアドレス → accountId → 先頭アカウント
const findFromAccount=(thread)=>{
  const m=[...thread.mails].reverse().find(m=>!isSelf(m.from)&&isSelf(m.to));
  return CONFIG.ACCOUNTS.find(a=>a.email.toLowerCase()===(m?.to||"").toLowerCase())
    ||CONFIG.ACCOUNTS.find(a=>a.id===thread.accountId)
    ||CONFIG.ACCOUNTS[0];
};
// ファイルをBase64に変換
const fileToBase64=(file)=>new Promise((resolve,reject)=>{
  const r=new FileReader();
  r.onload=()=>resolve(r.result.split(',')[1]);
  r.onerror=reject;
  r.readAsDataURL(file);
});
const pingN8n=()=>fetch(`${CONFIG.N8N_BASE_URL}${CONFIG.FETCH_WEBHOOK}?ping=1`,{signal:AbortSignal.timeout(3000)}).then(r=>r.ok||r.status===400||r.status===404).catch(()=>false);
const saveProfileNotion=async(p)=>{const res=await fetch(`${CONFIG.N8N_BASE_URL}${CONFIG.STYLE_PROFILE_WEBHOOK}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({profile:p})});if(!res.ok)throw new Error("Notion保存エラー");};

//  サブコンポーネント
// ═══════════════════════════════════════════════
const Dot=({on})=><span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:on?"#10B981":"#EF4444",marginLeft:5,flexShrink:0}}/>;
const Avatar=({name,email,size=36})=>{
  const bg=avatarColor(email||name||"?");
  return<div style={{width:size,height:size,borderRadius:"50%",background:bg,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.38,fontWeight:700,flexShrink:0,letterSpacing:"-.5px"}}>{initials(name||"?")}</div>;
};
const SpamBadge=({verdict})=>{const c={スパム:"#EF4444",疑わしい:"#F59E0B",正常:"#10B981"};return<span style={{fontSize:11,padding:"2px 7px",borderRadius:10,background:c[verdict]||"#6B7280",color:"#fff",marginLeft:6}}>{verdict}</span>;};
const DateSeparator=({label,T})=>(
  <div style={{display:"flex",alignItems:"center",margin:"16px 0 12px"}}>
    <div style={{flex:1,height:1,background:T.border}}/>
    <span style={{margin:"0 12px",fontSize:11,color:T.textTer,background:T.bg,padding:"2px 10px",borderRadius:10,whiteSpace:"nowrap"}}>{label}</span>
    <div style={{flex:1,height:1,background:T.border}}/>
  </div>
);

// 添付ファイル — 画像はビジュアルプレビュー、その他はファイルカード＋ダウンロードボタン
const openAttachment=(att)=>{
  if(!att.dataUrl){alert("このファイルのデータはキャッシュにありません。\n更新ボタンで再取得してください。");return;}
  // PDFや画像は新タブで開く、その他はダウンロード
  const openInTab=att.mimeType&&(att.mimeType.startsWith("image/")||att.mimeType.includes("pdf"));
  if(openInTab){window.open(att.dataUrl,"_blank");return;}
  const a=document.createElement("a");
  a.href=att.dataUrl;
  a.download=att.filename||"attachment";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
};
const AttachmentBubble=({att,isSent,T})=>{
  const isImage=!!(att.mimeType&&att.mimeType.startsWith("image/"));
  const isPdf=!!(att.mimeType&&att.mimeType.includes("pdf"));
  const hasData=!!att.dataUrl;
  const icon=attIcon(att.mimeType);
  const size=attSize(att.size);
  const wrapStyle={marginTop:6,marginLeft:isSent?"auto":"40px",maxWidth:"72%",display:"flex",flexDirection:"column",alignItems:isSent?"flex-end":"flex-start"};
  const cardBase={borderRadius:isSent?"14px 14px 4px 14px":"4px 14px 14px 14px",overflow:"hidden",border:"1px solid "+(isSent?"rgba(255,255,255,.2)":T.border),background:isSent?"rgba(255,255,255,.12)":T.hover};
  const btnStyle={display:"flex",alignItems:"center",justifyContent:"center",gap:4,padding:"5px 10px",border:"none",borderRadius:6,cursor:hasData?"pointer":"not-allowed",fontSize:11,fontWeight:600,opacity:hasData?1:0.45,background:isSent?"rgba(255,255,255,.18)":"rgba(0,0,0,.07)",color:isSent?"#fff":T.text};
  if(isImage){
    return(
      <div style={wrapStyle}>
        <div style={{...cardBase,width:220}}>
          {att.dataUrl
            ?<img src={att.dataUrl} alt={att.filename} onClick={()=>window.open(att.dataUrl,"_blank")} style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block",cursor:"zoom-in"}}/>
            :<div style={{background:isSent?"rgba(0,0,0,.18)":"rgba(0,0,0,.05)",display:"flex",alignItems:"center",justifyContent:"center",height:120,fontSize:48,userSelect:"none",flexDirection:"column",gap:6}}>
                <span>🖼</span>
                <span style={{fontSize:11,color:isSent?"rgba(255,255,255,.4)":"rgba(0,0,0,.3)"}}>キャッシュなし（再取得で表示）</span>
              </div>
          }
          <div style={{padding:"6px 10px 8px"}}>
            <div style={{fontSize:12,color:isSent?"rgba(255,255,255,.9)":T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:4}}>{att.filename}</div>
            {size&&<div style={{fontSize:11,color:isSent?"rgba(255,255,255,.5)":T.textTer,marginBottom:6}}>{size}</div>}
            <button style={btnStyle} onClick={()=>openAttachment(att)}>⬇ {hasData?"ダウンロード":"データなし"}</button>
          </div>
        </div>
      </div>
    );
  }
  const fileColor=isPdf?"#EF4444":att.mimeType?.includes("sheet")||att.mimeType?.includes("excel")?"#10B981":att.mimeType?.includes("word")||att.mimeType?.includes("document")?"#3B82F6":"#6B7280";
  return(
    <div style={wrapStyle}>
      <div style={{...cardBase,display:"flex",alignItems:"center",gap:10,padding:"8px 14px",minWidth:160,maxWidth:280}}>
        <div style={{width:36,height:36,borderRadius:8,background:fileColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:isSent?"rgba(255,255,255,.9)":T.text,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{att.filename}</div>
          {size&&<div style={{color:isSent?"rgba(255,255,255,.5)":T.textTer,fontSize:11,marginBottom:4}}>{size}</div>}
          <button style={{...btnStyle,width:"100%"}} onClick={()=>openAttachment(att)}>

  const[sending,setSending]=React.useState(false);const[err,setErr]=React.useState("");
  const[files,setFiles]=React.useState([]);

        {showCc&&<><input placeholder="CC" value={cc} onChange={e=>setCc(e.target.value)} style={inp}/><input placeholder="BCC" value={bcc} onChange={e=>setBcc(e.target.value)} style={inp}/></>}
        <button onClick={()=>setShowCc(v=>!v)} style={{background:"none",border:"none",color:T.textSec,fontSize:12,textAlign:"left",cursor:"pointer",marginBottom:6,padding:0}}>{showCc?"▲ CC/BCC を非表示":"▼ CC/BCC を追加"}</button>
        <input placeholder="件名" value={subject} onChange={e=>setSub(e.target.value)} style={inp}/>
        <textarea placeholder="本文..." value={body} onChange={e=>setBody(e.target.value)} rows={8} style={{...inp,resize:"vertical",flex:1,marginBottom:8}}/>

          <button onClick={()=>fileRef.current?.click()} style={{fontSize:12,color:T.accent,background:"none",border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 12px",cursor:"pointer"}}>📎 ファイルを添付</button>
          {files.map((f,i)=><span key={i} style={{marginLeft:6,fontSize:12,background:T.hover,padding:"3px 8px",borderRadius:6,color:T.text}}>{f.name}<button onClick={()=>setFiles(fs=>fs.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:T.textTer,fontSize:11}}>×</button></span>)}
        </div>
        {err&&<div style={{color:"#EF4444",fontSize:13,marginBottom:8}}>{err}</div>}
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button onClick={onClose} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${T.border}`,background:T.surface,cursor:"pointer",color:T.text}}>キャンセル</button>
          <button onClick={submit} disabled={sending} style={{padding:"8px 20px",borderRadius:8,border:"none",background:T.accent,color:"#fff",fontWeight:600,cursor:"pointer"}}>{sending?"送信中...":"送信"}</button>
        </div>

  );

  const[n8nOnline,    setN8nOnline]    =React.useState(null);
  const[summary,      setSummary]      =React.useState("");
  const[sumLoading,   setSumLoading]   =React.useState(false);
  const[replies,      setReplies]      =React.useState([]);
  const[repLoading,   setRepLoading]   =React.useState(false);

  const replyInputRef = React.useRef(null);

  const[showTasks,    setShowTasks]    =React.useState(false);
  const[tasks,        setTasks]        =React.useState(()=>lsGet(LS_TASKS,[]));
  const[ctxMenu,      setCtxMenu]      =React.useState(null);
  const[starred,      setStarred]      =React.useState(()=>new Set(lsGet(LS_STARRED,[])));
  const[readSet,      setReadSet]      =React.useState(()=>new Set(lsGet(LS_READ,[])));
  const chatBottomRef=React.useRef(null);
  const chatAreaRef  =React.useRef(null); // スクロールコンテナへの直接参照
  // スクロールコンテナを一番下まで確実に移動させる（scrollIntoView より確実）
  const scrollToBottom=React.useCallback((smooth=false)=>{
    const el=chatAreaRef.current;
    if(!el)return;
    if(smooth){el.scrollTo({top:el.scrollHeight,behavior:'smooth'});}
    else{el.scrollTop=el.scrollHeight;}
  },[]);

  const toggleStar=(id)=>setStarred(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);lsSet(LS_STARRED,[...n]);return n;});
  const markRead=(ids)=>setReadSet(prev=>{const n=new Set(prev);ids.forEach(id=>n.add(id));lsSet(LS_READ,[...n]);return n;});
  const markUnread=(ids)=>setReadSet(prev=>{const n=new Set(prev);ids.forEach(id=>n.delete(id));lsSet(LS_READ,[...n]);return n;});
  const isRead=(mail)=>mail.read||readSet.has(getMailKey(mail));

  const addTask=(title,sub="",snoozeAt=null)=>{
    const t={id:Date.now(),title,emailSubject:sub,done:false,snoozeAt,snoozed:false,createdAt:new Date().toISOString()};
    setTasks(prev=>{const n=[t,...prev];lsSet(LS_TASKS,n);return n;});
    if(snoozeAt) toast(`⏰ スヌーズ設定: ${new Date(snoozeAt).toLocaleString('ja-JP')}`,'info');
  };
  const toggleTask=(id)=>setTasks(prev=>{const n=prev.map(t=>t.id===id?{...t,done:!t.done,snoozed:false}:t);lsSet(LS_TASKS,n);return n;});
  const deleteTask=(id)=>setTasks(prev=>{const n=prev.filter(t=>t.id!==id);lsSet(LS_TASKS,n);return n;});
  const snoozeTask=(id,at)=>{
    // スヌーズ初回設定時に通知許可を要求（価値を見せてから）
    if('Notification' in window && Notification.permission==='default'){
      Notification.requestPermission();
    }
    setTasks(prev=>{const n=prev.map(t=>t.id===id?{...t,snoozeAt:at,snoozed:false}:t);lsSet(LS_TASKS,n);toast(`⏰ スヌーズ: ${new Date(at).toLocaleString('ja-JP')}`,'info');return n;});
  };

  // スヌーズ監視（毎分チェック）
  React.useEffect(()=>{
    const check=()=>{
      const now=Date.now();
      const due=tasks.filter(t=>t.snoozeAt&&!t.done&&!t.snoozed&&new Date(t.snoozeAt).getTime()<=now);
      if(!due.length)return;
      due.forEach(t=>{
        toast(`⏰ スヌーズ: ${t.title}`,'warn');
        if('Notification' in window && Notification.permission==='granted'){
          new Notification('MailChat スヌーズ',{body:t.title,icon:'/manifest.json'});
        }
      });
      setTasks(prev=>{const n=prev.map(t=>due.some(d=>d.id===t.id)?{...t,snoozed:true,snoozeAt:null}:t);lsSet(LS_TASKS,n);return n;});
    };
    check(); // 即時チェック
    const iv=setInterval(check,60000);
    return()=>clearInterval(iv);
  },[tasks]); // eslint-disable-line

  // 通知許可はスヌーズ初回設定時に要求（起動直後に出さない）

  const handleFetch=async()=>{
    setLoading(true);setFetchError("");
    try{
      const ids=activeAcc==="all"?CONFIG.ACCOUNTS.map(a=>a.id):[activeAcc];

    const lastMail=selThread.mails[selThread.mails.length-1];
    const bodySnap=replyText;

      messageId:optId,id:optId,

      to:replyTo,subject:"Re: "+selThread.subject,
      body:bodySnap,snippet:bodySnap.slice(0,120),
      date:new Date().toISOString(),read:true,isSent:true,
      accountId:acc?.id||selThread.accountId,
      attachments:filesSnap.map(f=>({filename:f.name,mimeType:f.type||"application/octet-stream",size:f.size})),

        body:bodySnap,
        accountId:acc?.id||selThread.accountId,

                        onMouseEnter={e=>e.currentTarget.style.background=T.hover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        ⏰ タスク化 (明朝9時)
                      </div>
                    </div>}
                  </div>
                </div>
              </div>

              {/* チャット */}
              <div ref={chatAreaRef} style={{flex:1,overflowY:"auto",padding:isMobile?"10px 12px":"16px 20px",background:T.bg,WebkitOverflowScrolling:"touch"}}>
                {(()=>{
                  const result=[];let lastDay=null;
                  selThread.mails.forEach((m,i)=>{
                    const day=dayKey(m.date);
                    if(day!==lastDay){lastDay=day;result.push(<DateSeparator key={"sep-"+day+i} label={formatDateSep(m.date)} T={T}/>);}
                    result.push(<ChatBubble key={getMailKey(m)||i} mail={m} isSent={!!m.isSent} isUnread={!isRead(m)&&!m.isSent} isStarred={starred.has(getMailKey(m))} onStar={toggleStar} T={T}/>);
                  });
                  return result;
                })()}
                <div ref={chatBottomRef} style={{height:1}}/>
              </div>

              {/* AI返信案パネル（折りたたみ） */}
              {replies.length>0&&(
                <div style={{borderTop:`1px solid ${T.border}`,padding:"10px 16px",background:T.surface}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontSize:13,fontWeight:600,color:T.textSec}}>💬 AI 返信案</span>
                    {styleProfile&&<span style={{fontSize:11,background:T.styleChip,color:"#7C3AED",padding:"2px 8px",borderRadius:10}}>🎨 文体適用済み</span>}
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {replies.map((r,i)=>(
                      <div key={i} style={{flex:"1 1 160px",background:T.hover,borderRadius:8,padding:"8px 10px",fontSize:13}}>
                        <div style={{fontWeight:600,color:T.accent,marginBottom:3,fontSize:12}}>{r.label}</div>
                        <div style={{color:T.text,lineHeight:1.5,whiteSpace:"pre-wrap",fontSize:13,marginBottom:6}}>{r.body}</div>
                        <button onClick={()=>{setReplyText(r.body);replyInputRef.current?.focus();}} style={{...mkBtn(T.accent,true)}}>↓ 入力欄へ</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ════ Spike スタイル ボトム入力バー ════ */}
              <div className="bottom-bar-safe" style={{borderTop:`1px solid ${T.border}`,background:T.surface,padding:"10px 14px",flexShrink:0}}>
                {/* From / To 表示行 */}
                <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:isMobile?3:6,fontSize:11,color:T.textTer,marginBottom:6}}>
                  <span>From:</span>
                  <select value={bottomFromAcc?.id||""} onChange={e=>setReplyFromAccId(e.target.value)}
                    style={{fontSize:11,border:"none",background:"none",color:T.textSec,cursor:"pointer",outline:"none",fontWeight:500,maxWidth:isMobile?120:180}}>
                    {CONFIG.ACCOUNTS.map(a=><option key={a.id} value={a.id}>{isMobile?a.name:`${a.name} (${a.email})`}</option>)}
                  </select>
                  <span style={{color:T.border}}>|</span>
                  <span>To:</span>
                  <span style={{color:T.textSec,fontWeight:500,maxWidth:isMobile?130:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                    title={bottomReplyTo}>{bottomReplyTo||"(未確定)"}</span>
                  {replyFiles.length>0&&<span style={{marginLeft:2,color:T.accent}}>📎{replyFiles.length}</span>}
                </div>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,background:T.hover,borderRadius:14,padding:"6px 8px 6px 14px",border:`1px solid ${T.border}`}}>
                  {/* 添付ボタン */}
                  <input ref={replyFileRef} type="file" multiple style={{display:"none"}}
                    onChange={e=>setReplyFiles(f=>[...f,...Array.from(e.target.files)])}/>
                  <button onClick={()=>replyFileRef.current?.click()}
                    title="ファイルを添付"
                    style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:T.textTer,padding:"2px",flexShrink:0,lineHeight:1}}>
                    📎
                  </button>
                  {/* テキスト入力 */}
                  <textarea
                    ref={replyInputRef}
                    value={replyText}
                    onChange={e=>{setReplyText(e.target.value);e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,140)+'px';}}
                    onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleBottomSend();}}}
                    onFocus={()=>{
                      // モバイルでキーボードが開いた後に入力欄が見える位置にスクロール
                      if(isMobile) setTimeout(()=>replyInputRef.current?.scrollIntoView({behavior:'smooth',block:'nearest'}),320);
                    }}
                    placeholder={isMobile?`${contact.name} へ返信…`:`${contact.name} へ返信… (Enter で送信 / Shift+Enter で改行)`}
                    rows={1}
                    style={{flex:1,background:"none",border:"none",outline:"none",resize:"none",fontSize:14,color:T.text,lineHeight:1.5,fontFamily:"inherit",maxHeight:isMobile?80:140,overflow:"auto",padding:"4px 0"}}
                  />
                  {/* ✨ AI返信案ボタン */}
                  <button
                    onClick={()=>{setRepLoading(true);generateReplies(lastMail,styleProfile).then(r=>setReplies(r)).catch(e=>setReplies([{label:"エラー",body:e.message}])).finally(()=>setRepLoading(false));}}
                    disabled={repLoading}
                    title={styleProfile?"AI返信案 (文体適用済み)":"AI返信案"}
                    style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:styleProfile?"#7C3AED":T.textTer,padding:"2px",flexShrink:0,lineHeight:1,opacity:repLoading?0.5:1}}>
                    {repLoading?<span className="spinner"/>:"✨"}
                  </button>
                  {/* 送信ボタン */}
                  <button
                    onClick={handleBottomSend}
                    disabled={!replyText.trim()&&replyFiles.length===0}
                    style={{width:34,height:34,borderRadius:"50%",border:"none",flexShrink:0,cursor:replyText.trim()||replyFiles.length>0?"pointer":"not-allowed",
                      background:replyText.trim()||replyFiles.length>0?T.accent:"#D1D5DB",
                      color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}}>
                    ➤
                  </button>
                </div>
                {/* 添付ファイル一覧 */}
                {replyFiles.length>0&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:6}}>
                    {replyFiles.map((f,i)=>(
                      <span key={i} style={{fontSize:12,background:T.hover,border:`1px solid ${T.border}`,borderRadius:6,padding:"2px 8px",color:T.text,display:"flex",alignItems:"center",gap:4}}>
                        📎 {f.name}
                        <button onClick={()=>setReplyFiles(fs=>fs.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:T.textTer,fontSize:12,lineHeight:1}}>×</button>
                      </span>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        })()
      )}

      {/* 右クリックメニュー */}
      {ctxMenu&&<ContextMenu x={ctxMenu.x} y={ctxMenu.y} thread={ctxMenu.thread}
        isStarred={ctxMenu.thread.mails.some(m=>starred.has(getMailKey(m)))}
        allRead={ctxMenu.thread.mails.every(m=>isRead(m))}
        onClose={()=>setCtxMenu(null)} T={T}
        onStar={()=>ctxMenu.thread.mails.forEach(m=>toggleStar(getMailKey(m)))}
        onMarkRead={()=>{const ids=ctxMenu.thread.mails.map(m=>getMailKey(m));ctxMenu.thread.mails.every(m=>isRead(m))?markUnread(ids):markRead(ids);}}
        onForward={()=>openCompose("forward",ctxMenu.thread)}
        onCreateTask={()=>{addTask(`対応: ${ctxMenu.thread.subject}`,ctxMenu.thread.subject);setShowTasks(true);}}
      />}

      {composeMode&&<ComposeModal {...composeMode} onClose={()=>setComposeMode(null)} T={T} onSend={(p)=>{
        const optId="opt_"+Date.now();
        const acc=CONFIG.ACCOUNTS.find(a=>a.id===(p.accountId||CONFIG.ACCOUNTS[0]?.id));
        const optMail={
          messageId:optId,id:optId,
          from:p.from||acc?.email||"",fromName:p.from||acc?.email||"",
          to:p.to||"",subject:p.subject||"",
          body:p.body||"",snippet:(p.body||"").slice(0,120),
          date:new Date().toISOString(),read:true,isSent:true,
          accountId:p.accountId||CONFIG.ACCOUNTS[0]?.id||"",
          attachments:(p.attachments||[]).map(a=>({filename:a.filename,mimeType:a.mimeType,size:a.size})),
          _optimistic:true,
        };
        setEmails(prev=>[...prev,optMail]);
        sendEmailAPI(p).then(result=>{
          const confirmed=result&&result.sentMessage
            ?{...result.sentMessage,isSent:true,read:true,_optimistic:false,accountId:p.accountId||CONFIG.ACCOUNTS[0]?.id}
            :{...optMail,_optimistic:false};
          setEmails(prev=>prev.map(e=>e.messageId===optId?confirmed:e));
          toast("送信しました ✓",'success');
        }).catch(e=>{
          setEmails(prev=>prev.filter(e=>e.messageId!==optId));
          toast("送信失敗: "+e.message,'error');
        });
      }}/>}
      {showTasks&&<TaskPanel tasks={tasks} onClose={()=>setShowTasks(false)} onAdd={addTask} onToggle={toggleTask} onDelete={deleteTask} onSnooze={snoozeTask} T={T}/>}

      {/* 文体プロファイル詳細 */}
      {showProfile&&styleProfile&&(
        <div onClick={e=>e.target===e.currentTarget&&setShowProfile(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}>
          <div style={{background:T.surface,borderRadius:14,padding:28,width:560,maxWidth:"92vw",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,.3)",border:`1px solid ${T.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
              <h3 style={{fontSize:17,fontWeight:700,color:T.text}}>🎨 文体プロファイル</h3>
              <button onClick={()=>setShowProfile(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:T.textSec}}>✕</button>
            </div>
            <div style={{background:T.styleChip,borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:14,lineHeight:1.7,color:"#5B21B6"}}>{styleProfile.summary}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[["よく使う書き出し",styleProfile.greetings,"#F0FDF4","#166534"],["よく使う締め",styleProfile.closings,"#EFF6FF","#1E40AF"],
                ["特徴的なフレーズ",styleProfile.keyPhrases,"#FDF4FF","#7E22CE"],["文体の特徴",styleProfile.characteristics,"#FFFBEB","#92400E"]]
                .filter(([,items])=>items?.length).map(([title,items,bg,tc])=>(
                <div key={title} style={{background:bg,borderRadius:8,padding:"10px 12px"}}>
                  <div style={{fontSize:11,fontWeight:600,color:tc,marginBottom:5}}>{title}</div>
                  {items.map((it,i)=><div key={i} style={{fontSize:13,color:"#374151",marginBottom:3}}>· {it}</div>)}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<MailChat/>);

// Service Worker 登録
// localhost (開発環境) では登録しない → キャッシュ問題を回避
// 本番 or ?sw=1 クエリ付きの場合のみ有効化
if ('serviceWorker' in navigator && (location.hostname !== 'localhost' || location.search.includes('sw=1'))) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(()=>{console.log('[SW] 登録完了');})
      .catch(()=>{});
  });
} else if (location.hostname === 'localhost') {
  // 開発中: 既存の SW があれば登録解除してキャッシュをクリア
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>r.unregister());
    });
  }
}
</script>
</body>
</html>
